<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LSCTI | Notepad & Paint Notes</title>
  <link rel="shortcut icon" href="../images/favicon2.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1e293b;
      --secondary: #3b82f6;
      --accent: #6dc854;
      --danger: #ef4444;
      --bg: #f1f5f9;
      --white: #ffffff;
      --text: #334155;
      --muted: #64748b;
      --border: #e2e8f0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    

    /* ── CONTENT AREA ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 20px 16px;
      gap: 12px;
    }

    /* Subject header bar */
    .subject-bar {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      animation: fadeDown 0.35s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subject-left { display: flex; align-items: center; gap: 12px; }

    .subject-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--secondary), #1d4ed8);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(59,130,246,0.25);
    }
    .subject-icon svg { width: 20px; height: 20px; stroke: #fff; fill: none; }

    .subject-meta h2 {
      font-size: 15px; font-weight: 700;
      color: var(--primary); letter-spacing: -0.2px;
    }
    .subject-meta .tags {
      display: flex; align-items: center; gap: 6px; margin-top: 3px;
    }
    .tag {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 50px;
      letter-spacing: 0.2px;
    }
    .tag-blue   { background: #dbeafe; color: #1d4ed8; }
    .tag-green  { background: #dcfce7; color: #15803d; }
    .tag-slate  { background: #f1f5f9; color: #475569; }

    .subject-actions { display: flex; align-items: center; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 15px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer; text-decoration: none;
      transition: all 0.18s; border: none;
      white-space: nowrap;
    }
    .btn svg { width: 13px; height: 13px; fill: none; }
    .btn-primary {
      background: linear-gradient(135deg, var(--secondary), #1d4ed8);
      color: #fff;
      box-shadow: 0 3px 10px rgba(59,130,246,0.25);
    }
    .btn-primary svg { stroke: #fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(59,130,246,0.35); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost svg { stroke: var(--muted); }
    .btn-ghost:hover { color: var(--text); border-color: #cbd5e1; background: #f8fafc; }

    /* ── PDF VIEWER ── */
    .viewer-wrap {
      flex: 1;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      animation: fadeUp 0.35s 0.05s ease both;
      min-height: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Chrome-style toolbar */
    .viewer-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 16px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }
    .toolbar-left { display: flex; align-items: center; gap: 8px; }
    .dots { display: flex; gap: 5px; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .dot-r { background: #ef4444; }
    .dot-y { background: #f59e0b; }
    .dot-g { background: #6dc854; }

    .toolbar-filename {
      font-size: 12px; font-weight: 500; color: var(--muted);
      padding: 4px 12px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .toolbar-filename svg { width: 12px; height: 12px; stroke: #94a3b8; fill: none; }

    .toolbar-right { display: flex; align-items: center; gap: 6px; }
    .toolbar-pill {
      font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 50px;
      display: flex; align-items: center; gap: 4px;
    }
    .pill-blue { background: #dbeafe; color: #1d4ed8; }
    .pill-blue svg { width: 10px; height: 10px; stroke: #2563eb; fill: none; }
    .pill-green { background: #dcfce7; color: #15803d; }
    .pill-green svg { width: 10px; height: 10px; stroke: #16a34a; fill: none; }

    .pdf-iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      background: #f8fafc;
      min-height: 0;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .breadcrumb { display: none; }
      .subject-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
      .subject-actions { width: 100%; }
      .btn { flex: 1; justify-content: center; }
      .toolbar-filename { display: none; }
      body { overflow: auto; }
      .content { overflow: visible; }
      .viewer-wrap { min-height: 65vh; }
    }
  </style>
</head>
<body>
<!-- Content -->
<div class="content">

  <!-- Subject bar -->
  <div class="subject-bar">
    <div class="subject-left">
      <div class="subject-icon">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <div class="subject-meta">
        <h2>Wordpad</h2>
        <div class="tags">
          
          <span class="tag tag-green">Free</span>
          <span class="tag tag-slate">PDF Notes</span>
        </div>
      </div>
    </div>
    <div class="subject-actions">
      <a href="https://drive.google.com/file/d/15JEQCYwXzAmYrqx1w_Rt-mdRIXhPe1sx/view" target="_blank" class="btn btn-ghost">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Open in Drive
      </a>
      <a href="https://drive.google.com/file/d/15JEQCYwXzAmYrqx1w_Rt-mdRIXhPe1sx" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        Download PDF
      </a>
    </div>
  </div>

  <!-- PDF Viewer -->
  <div class="viewer-wrap">
    <div class="viewer-toolbar">
      <div class="toolbar-left">
        <div class="dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <div class="toolbar-filename">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          Wordpad.pdf
        </div>
      </div>
    </div>
    <iframe
      class="pdf-iframe"
      src="https://drive.google.com/file/d/15JEQCYwXzAmYrqx1w_Rt-mdRIXhPe1sx/preview"
      loading="lazy"
      allow="autoplay">
    </iframe>
  </div>

</div>

</body>
</html>
